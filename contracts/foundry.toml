[profile.default]
src = "src"
out = "out"
libs = ["lib"]
# OZ 5.x MessageHashUtils requires solc >= 0.8.24; project pragmas remain ^0.8.20
solc = "0.8.26"
optimizer = true
optimizer_runs = 200

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
